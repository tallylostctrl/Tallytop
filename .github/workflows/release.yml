name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest]
                include:
                    - os: ubuntu-latest
                      platform: linux

        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4 # Install pnpm using packageManager key in package.json

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm build

            - name: Run Electron Builder
              if: ${{ matrix.platform != 'mac' }}
              run: pnpm electron-builder --${{ matrix.platform }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-${{ matrix.platform }}
                  path: dist/**

    release:
        needs: build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/download-artifact@v4
              with:
                  path: release-assets

            - name: check version
              id: version_check
              run: |
                  CURRENT=$(cat package.json | jq -r .version)
                  LAST_TAG=$(git describe --tags --abbrev=0 || echo "none")
                  if [ "$LAST_TAG" = "none" ]; then
                    echo "no prev tag"
                  else
                    TAG_VER="${LAST_TAG#v}"
                    if [ "$TAG_VER" = "$CURRENT" ]; then
                      echo "error: version ($CURRENT) matches last tag ($TAG_VER)"
                      exit 1
                    fi
                  fi
                  echo "version $CURRENT"

            - name: Upload each file in release-assets/ to the release
              shell: bash
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  VERSION=$(jq -r .version package.json)
                  TAG_NAME="v$VERSION"

                  echo "Using tag: $TAG_NAME"

                  if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
                    gh release create "$TAG_NAME" \
                      --title "$TAG_NAME" \
                      --generate-notes \
                      --latest
                  fi

                  for file in release-assets/*/*; do
                    if [ -f "$file" ]; then
                      echo "Uploading $file..."
                      gh release upload "$TAG_NAME" "$file" --clobber
                    else
                      echo "Skipping $file (not a file)"
                    fi
                  done
